<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>巨人を登れ！ Climb the Giant </title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* HTML側でのスタイル調整 */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #fff;
        }

        #canvasWrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* UIレイヤーの配置 */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* UIレイヤー自体はクリックを透過させる */
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            text-shadow: 2px 2px 2px #000;
            pointer-events: auto;
        }

        /* リセットボタンのスタイル */
        #resetBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2); /* 少し透過した白 */
            color: #fff;
            border: 2px solid #000;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto; /* ボタンはクリック可能にする */
            z-index: 100;
            transition: background 0.2s;
            -webkit-user-select: none; /* テキスト選択防止 */
            user-select: none;
        }

        #resetBtn:active {
            background: rgba(200, 200, 200, 0.9);
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div id="uiLayer">
            <div id="startScreen" style="
                position: absolute; top: 0; left: 0; width: 100%; height: 100%;
                background-color: #f0f0f0;
                background-image: url('bg_pattern.png');
                background-repeat: repeat;
                background-size: 400px 400px;
                animation: scrollPattern 10s linear infinite;
                display: flex; justify-content: center; align-items: center;
                pointer-events: auto; z-index: 200; transition: opacity 0.5s;
                overflow: hidden;
            ">
            <img id="titleLogo" src="title.png" style="
                position: absolute;
                /* --- 位置の調整 --- */
                left: 50%;
                top: 40%; /* 画面の上から40%の位置（真ん中より少し上） */
                transform: translate(-50%, -50%); /* 自分自身の中心を支点にする */
                
                /* --- サイズの調整 --- */
                width: 100%;       /* 画面幅に対する大きさ（適宜調整） */
                max-width: 500px; /* PCなどで大きくなりすぎない制限 */
                height: auto;     /* 比率を維持 */
                
                /* --- その他設定 --- */
                z-index: 201;
            ">
                <div style="
                    position: absolute; /* 絶対位置にして画像に重ねる */
                    z-index: 202;       /* 画像よりさらに上 */
                    text-align: center;
                    width: 100%;
                    top: 75%;           /* 画面の下から25%あたりの位置に調整 */
                ">
                    <div id="loadingMessage" style="color: #fff; font-family: sans-serif; font-size: 16px; text-shadow: 0 0 10px rgba(0,0,0,0.8);">Loading...</div>

                    <div id="progressContainer" style="
                        width: 200px; 
                        height: 10px; 
                        background: rgba(0, 0, 0, 0.3); 
                        margin: 15px auto; 
                        border-radius: 5px; 
                        overflow: hidden;
                        border: 1px solid rgba(255, 255, 255, 0.3);
                    ">
                        <div id="progressBar" style="
                            width: 0%; 
                            height: 100%; 
                            background: #00ffcc; 
                            box-shadow: 0 0 10px #00ffcc;
                            transition: width 0.1s linear;
                        "></div>
                    </div>
                    
                    <div id="clickToStart" style="
                        color: #fff; 
                        font-family: sans-serif; 
                        font-size: 26px; 
                        font-weight: bold; 
                        display: none; 
                        cursor: pointer; 
                        animation: blink 1.5s infinite;
                        text-shadow: 2px 2px 8px rgba(0,0,0,1); /* 背景画像に負けない強い影 */
                        letter-spacing: 2px;
                    ">
                        - CLICK TO START -
                    </div>
                </div>

                <div style="
                    position: absolute;
                    bottom: 10px;      /* 画面下から 10px */
                    right: 15px;       /* 画面右から 15px */
                    z-index: 203;      /* 文字列よりも前面へ */
                    color: rgba(255, 255, 255, 1); /* 少し透けさせて馴染ませる */
                    font-family: sans-serif;
                    font-size: 20px;
                    pointer-events: none; /* クリックを邪魔しない */
                    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8); /* 視認性確保 */
                ">
                    &copy;2026 Chijimetaro
                </div>
            </div>

            <style>

                /* --- 斜め45度スクロールのアニメーション定義をCSSに追加 --- */
                @keyframes scrollPattern {
                    0% {
                        /* 背景の位置（左上を原点） */
                        background-position: 0 0;
                    }
                    100% {
                        /* 右下方向（斜め45度）へ、画像の1周期分移動させる */
                        /* background-size で指定したサイズ（今回は100px）と同じ数値を指定すると滑らかに繋がります */
                        background-position: 400px 400px; 
                    }
                }
            /* 点滅アニメーションをCSSに追加 */
            @keyframes blink {
                0% { opacity: 1; }
                50% { opacity: 0; }
                100% { opacity: 1; }
            }
            </style>

            <div id="ui">
                <div> <span id="score">0</span>m</div>
            </div>

            <button id="langBtn" onclick="toggleLanguage()" style="
                    position: absolute;
                    bottom: 180px;
                    right: 10px;
                    padding: 10px 15px;
                    background: rgba(255, 255, 255, 0.7);
                    border: 2px solid #000;
                    border-radius: 8px;
                    font-weight: bold;
                    pointer-events: auto;
                ">JP / EN</button>

            <button id="resetBtn" onclick="fullReset()">RESET</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
